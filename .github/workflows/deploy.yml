name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run tests when available
        run: |
          if [ -d tests ] && find tests -type f \( -name '*.test.ts' -o -name '*.test.tsx' \) -print -quit | grep -q .; then
            npm run test:run
          else
            echo "No test files found; skipping test run."
          fi
      - run: npm run build
      - run: test -f dist/ort/ort-wasm-simd-threaded.mjs
      - run: test -f dist/ort/ort-wasm-simd-threaded.wasm
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
